<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Primary meta -->
		<meta name="description" content="Foundiq — Headless CMS, social management and commerce in one API." />
		<meta name="theme-color" content="#f5a623" />
		<meta name="author" content="Myelin Systems" />

		<!-- Open Graph -->
		<meta property="og:type"        content="website" />
		<meta property="og:site_name"   content="Foundiq" />
		<meta property="og:title"       content="Foundiq — CMS + Social + Commerce. One API." />
		<meta property="og:description" content="Store content, manage social, sell products — then fetch everything with a single API your developers will love." />
		<meta property="og:image"       content="https://foundiq.nl/og-image.png" />
		<meta property="og:url"         content="https://foundiq.nl" />

		<!-- Twitter / X -->
		<meta name="twitter:card"        content="summary_large_image" />
		<meta name="twitter:title"       content="Foundiq — CMS + Social + Commerce. One API." />
		<meta name="twitter:description" content="Store content, manage social, sell products — then fetch everything with a single API." />
		<meta name="twitter:image"       content="https://foundiq.nl/og-image.png" />

		<!-- Favicon -->
		<link rel="icon"             href="/favicon.ico" sizes="any" />
		<link rel="icon"             href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
